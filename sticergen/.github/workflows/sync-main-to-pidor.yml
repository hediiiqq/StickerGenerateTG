name: Sync main to pidor

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: sync-main-to-pidor
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge main into pidor
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main pidor
          git switch --track origin/pidor
          git merge --no-edit origin/main
          git push origin HEAD:pidor
